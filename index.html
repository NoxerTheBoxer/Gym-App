<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymPro">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="./manifest.json">
<title>Gym Programme</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#0a0a0a;--s1:#141414;--s2:#1e1e1e;--bd:#2a2a2a;--tx:#f0f0f0;--mt:#888;--ac:#e8ff00;--red:#ff453a;--org:#ff9f0a;--grn:#32d74b;--blu:#0a84ff;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,sans-serif;font-size:15px;display:flex;flex-direction:column}
.topbar{background:var(--s1);border-bottom:1px solid var(--bd);padding:14px 16px 10px;padding-top:calc(14px + env(safe-area-inset-top,0px));flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;color:var(--ac);line-height:1}
.week-badge{font-size:11px;font-weight:600;background:rgba(232,255,0,.1);color:var(--ac);padding:4px 10px;border-radius:20px;border:1px solid rgba(232,255,0,.2)}
.mode-toggle{display:flex;background:var(--s2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-top:10px}
.mode-btn{flex:1;padding:7px 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:none;border:none;color:var(--mt);cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--ac);color:#000}
.nav{display:grid;grid-template-columns:repeat(5,1fr);background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0}
.nav-btn{padding:10px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mt);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.nav-btn.active{color:var(--ac)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--ac);border-radius:2px}
.nav-icon{font-size:18px}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe))}
.panel{display:none;padding:12px 14px}
.panel.active{display:block}
.sess-header{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px}
.sess-day{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--ac);letter-spacing:1px;line-height:1}
.sess-sub{font-size:12px;color:var(--mt);margin-top:2px}
.home-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(10,132,255,.15);color:var(--blu);border:1px solid rgba(10,132,255,.3);margin-top:6px}
.prog-wrap{margin-top:10px}
.prog-label{font-size:11px;color:var(--mt);margin-bottom:4px;display:flex;justify-content:space-between}
.prog-bar{background:var(--bd);height:4px;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s;width:0%}
.kit-note{background:rgba(10,132,255,.08);border:1px solid rgba(10,132,255,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#4da3ff;margin-bottom:12px;line-height:1.5}
.ex-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ex-card.done{border-color:var(--grn);opacity:.65}
.ex-main{display:grid;grid-template-columns:36px 1fr auto;gap:8px;align-items:start;padding:12px}
.ex-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--bd);line-height:1}
.ex-card.done .ex-num{color:var(--grn)}
.ex-name{font-weight:600;font-size:14px;margin-bottom:3px}
.ex-note{font-size:12px;color:var(--mt);line-height:1.4}
.equip{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(10,132,255,.1);color:#4da3ff;border:1px solid rgba(10,132,255,.2);margin-bottom:4px;margin-right:3px}
.ex-right{text-align:right;flex-shrink:0}
.ex-sets{font-size:12px;color:var(--mt);margin-bottom:5px;white-space:nowrap}
.fb{display:inline-block;font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
.fn{background:rgba(255,69,58,.15);color:var(--red)}
.fc{background:rgba(255,159,10,.15);color:var(--org)}
.fy{background:rgba(50,215,75,.15);color:var(--grn)}
.ex-actions{display:flex;gap:6px;padding:0 12px 12px}
.ex-btn{flex:1;padding:8px;font-size:12px;font-weight:600;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);cursor:pointer}
.ex-btn:active{transform:scale(.97)}
.done-btn{background:rgba(50,215,75,.1);color:var(--grn);border-color:rgba(50,215,75,.3)}
.timer-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.timer-ov.show{display:flex}
.t-label{font-size:13px;font-weight:600;color:var(--mt);text-transform:uppercase;letter-spacing:.1em}
.t-circle{width:200px;height:200px;position:relative}
.t-circle svg{width:200px;height:200px;transform:rotate(-90deg)}
.t-track{fill:none;stroke:var(--s2);stroke-width:8}
.t-prog{fill:none;stroke:var(--ac);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.t-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.t-secs{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--ac);line-height:1}
.t-next{font-size:11px;color:var(--mt);margin-top:4px}
.t-btns{display:flex;gap:12px}
.t-btn{padding:14px 28px;font-size:14px;font-weight:700;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);cursor:pointer;text-transform:uppercase}
.t-btn.skip{background:var(--ac);color:#000;border-color:var(--ac)}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mt);margin:16px 0 8px}
.r-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:8px}
.r-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.r-body{font-size:13px;color:var(--mt);line-height:1.6}
.p-table{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:12px}
.p-head{padding:12px 14px;font-weight:600;font-size:14px;border-bottom:1px solid var(--bd)}
.p-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);font-size:13px;gap:12px}
.p-row:last-child{border-bottom:none}
.p-val{color:var(--mt);font-size:12px;text-align:right;flex-shrink:0}
.wk-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.wk-day{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:8px 3px;text-align:center}
.wk-dn{font-size:10px;font-weight:600;color:var(--mt);margin-bottom:4px;text-transform:uppercase}
.wk-tag{font-size:8px;font-weight:700;padding:2px 3px;border-radius:3px;display:block;margin:1px auto;text-transform:uppercase}
.wl{background:rgba(10,132,255,.2);color:#0a84ff}
.wu{background:rgba(50,215,75,.2);color:#32d74b}
.wr{background:rgba(255,255,255,.05);color:var(--mt)}
.notif{position:fixed;bottom:calc(20px + var(--safe));left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:200;transition:transform .3s;white-space:nowrap}
.notif.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-row">
    <div class="app-title">GymPro</div>
    <span class="week-badge">Block A · Week 1</span>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-gym" onclick="setMode('gym')">🏋️ Gym</button>
    <button class="mode-btn" id="btn-home" onclick="setMode('home')">🏠 Home</button>
  </div>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="go('la')" id="nav-la"><span class="nav-icon">🦵</span>Lower A</button>
  <button class="nav-btn" onclick="go('ua')" id="nav-ua"><span class="nav-icon">💪</span>Upper A</button>
  <button class="nav-btn" onclick="go('lb')" id="nav-lb"><span class="nav-icon">🦵</span>Lower B</button>
  <button class="nav-btn" onclick="go('ub')" id="nav-ub"><span class="nav-icon">💪</span>Upper B</button>
  <button class="nav-btn" onclick="go('info')" id="nav-info"><span class="nav-icon">📋</span>Rules</button>
</div>
<div class="main" id="main"></div>
<div class="timer-ov" id="tov">
  <div class="t-label">REST TIMER</div>
  <div class="t-circle"><svg viewBox="0 0 200 200"><circle class="t-track" cx="100" cy="100" r="88"/><circle class="t-prog" id="tcirc" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"/></svg><div class="t-num"><div class="t-secs" id="tdis">120</div><div class="t-next" id="tnxt">Next: —</div></div></div>
  <div class="t-btns"><button class="t-btn" onclick="stopT()">Cancel</button><button class="t-btn skip" onclick="stopT()">Skip ›</button></div>
</div>
<div class="notif" id="notif"></div>
<script>
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

var mode='gym', cur='la', done={}, tInt=null, tSecs=0, tTotal=0;
var C=553;

var DATA = {
  gym: {
    la: {
      day:'LOWER A', sub:'Monday · Squat dominant · Full CNS after weekend rest', kit:null,
      ex:[
        {n:'Back Squat',d:'Primary strength movement. Highest CNS demand — always first.',sets:'4 × 4–6',f:'fn',fr:'Never fail',rest:180,next:'Romanian Deadlift'},
        {n:'Romanian Deadlift',d:'Hinge pattern while posterior chain is strong. 3 sec eccentric.',sets:'3 × 6–8',f:'fc',fr:'1–2 RIR',rest:90,next:'Bulgarian Split Squat'},
        {n:'Bulgarian Split Squat',d:'Unilateral stability and hip flexor length. Rear foot on bench.',sets:'3 × 6–8 each',f:'fc',fr:'1–2 RIR',rest:90,next:'Nordic Curl'},
        {n:'Nordic Hamstring Curl',d:'Injury prevention for grapplers. Start assisted with hands on floor.',sets:'3 × 4–6',f:'fc',fr:'1–2 RIR',rest:90,next:'Tibialis Raise'},
        {n:'Tibialis Raise',d:'Foot and shin strength. Fixes BJJ foot cramping. Always last.',sets:'3 × 15–20',f:'fy',fr:'Last set fail',rest:60,next:'Next set'}
      ]
    },
    ua: {
      day:'UPPER A', sub:'Tuesday · Horizontal push + vertical pull · Antagonist pairing', kit:null,
      ex:[
        {n:'Barbell Bench Press',d:'Primary horizontal push. Needs fresh CNS. Heaviest upper body movement.',sets:'4 × 4–6',f:'fn',fr:'Never fail',rest:180,next:'Weighted Pull-Up'},
        {n:'Weighted Pull-Up',d:'Primary vertical pull. Antagonist to bench — lats fresh.',sets:'4 × 4–6',f:'fn',fr:'Never fail',rest:180,next:'Overhead Press'},
        {n:'Overhead Press',d:'Secondary push. Shoulders warm from bench. Builds handstand strength.',sets:'3 × 6–8',f:'fc',fr:'1–2 RIR',rest:120,next:'Chest-Supported Row'},
        {n:'Chest-Supported Row',d:'Secondary horizontal pull. Lower back removed from equation.',sets:'3 × 8–10',f:'fc',fr:'1–2 RIR',rest:90,next:'Incline DB Press'},
        {n:'Incline Dumbbell Press',d:'Accessory upper chest. Pre-fatigue from bench — lighter loads hit hard.',sets:'3 × 8–10',f:'fy',fr:'Last set fail',rest:60,next:'Face Pull'},
        {n:'Face Pull',d:'Rotator cuff and rear delt health. Mandatory for shoulder longevity.',sets:'3 × 15–20',f:'fy',fr:'Last set fail',rest:60,next:'Next set'}
      ]
    },
    lb: {
      day:'LOWER B', sub:'Thursday · Hinge dominant · Wednesday rest = full CNS recovery', kit:null,
      ex:[
        {n:'Conventional Deadlift',d:'Heaviest movement in the programme. Absolute first — any fatigue before this is unacceptable.',sets:'4 × 3–5',f:'fn',fr:'Never fail',rest:180,next:'Front Squat'},
        {n:'Front Squat',d:'Quad dominant, upright torso. Different emphasis from deadlift.',sets:'3 × 5–7',f:'fc',fr:'1–2 RIR',rest:120,next:'Hip Thrust'},
        {n:'Hip Thrust',d:'Glute peak contraction at full extension. Deadlift does not hit this range.',sets:'3 × 8–10',f:'fc',fr:'1–2 RIR',rest:90,next:'Single Leg Press'},
        {n:'Single Leg Press',d:'Unilateral quad volume. Low spinal load when erectors are fatigued.',sets:'3 × 8–10 each',f:'fy',fr:'Last set fail',rest:60,next:'Calf Raise'},
        {n:'Standing Calf Raise',d:'Full range of motion, slow tempo. Always last.',sets:'4 × 12–15',f:'fy',fr:'Last set fail',rest:60,next:'Next set'}
      ]
    },
    ub: {
      day:'UPPER B', sub:'Friday · Vertical push + horizontal pull · Row leads', kit:null,
      ex:[
        {n:'Barbell Row',d:'Heaviest pull movement. Fresh spinal erectors required. Primary strength driver.',sets:'4 × 5–7',f:'fn',fr:'Never fail',rest:180,next:'DB Shoulder Press'},
        {n:'Seated DB Shoulder Press',d:'Primary vertical push. Deltoids fresh — rows do not fatigue them.',sets:'4 × 6–8',f:'fc',fr:'1–2 RIR',rest:120,next:'Weighted Dips'},
        {n:'Weighted Dips',d:'Tricep and lower chest. Hits all three push muscles with complementary angles.',sets:'3 × 8–10',f:'fc',fr:'1–2 RIR',rest:90,next:'Lat Pulldown'},
        {n:'Lat Pulldown',d:'Vertical pull volume. Full stretch at top every rep.',sets:'3 × 8–10',f:'fc',fr:'1–2 RIR',rest:90,next:'Lateral Raise'},
        {n:'Lateral Raise',d:'Medial delt width. Pre-fatigue from pressing — lighter loads still hit hard.',sets:'3 × 12–15',f:'fy',fr:'Last set fail',rest:45,next:'Hammer Curl'},
        {n:'Hammer Curl',d:'Brachialis and grip strength. Lowest CNS demand. Always last.',sets:'3 × 10–12',f:'fy',fr:'Last set fail',rest:45,next:'Next set'}
      ]
    }
  },
  home: {
    la: {
      day:'LOWER A', sub:'Monday · Squat dominant · Home version',
      kit:'2×35lb DBs · Resistance band · Chair or sofa · Wall',
      ex:[
        {n:'Goblet Squat — 2 sec pause',eq:'2×35lb DBs',d:'Hold both 35s at chest (70lbs total). 2 sec pause at the bottom every rep. Compensates for lighter load with time under tension. Chest up, knees over toes.',sets:'4 × 6–8',f:'fn',fr:'Never fail',rest:120,next:'DB Romanian Deadlift'},
        {n:'Dumbbell Romanian Deadlift',eq:'2×35lb DBs',d:'35lb in each hand. Hinge at hip, 3 sec controlled eccentric. Identical movement to gym version — higher reps for lighter loading.',sets:'3 × 10–12',f:'fc',fr:'1–2 RIR',rest:90,next:'DB Bulgarian Split Squat'},
        {n:'DB Bulgarian Split Squat',eq:'2×35lb DBs + Chair',d:'35lb each hand, rear foot on chair or sofa. Identical to gym version. 35lbs per hand is serious unilateral loading.',sets:'3 × 8–10 each',f:'fc',fr:'1–2 RIR',rest:90,next:'Nordic Curl'},
        {n:'Nordic Hamstring Curl',eq:'Sofa anchor',d:'Tuck feet under sofa. Lower body toward floor as slowly as possible (4–5 sec). Catch with hands, push back up. Start with slow negatives if full reps are not possible yet.',sets:'3 × 4–6',f:'fc',fr:'1–2 RIR',rest:90,next:'Tibialis Raise'},
        {n:'Tibialis Raise — wall',eq:'Bodyweight + Wall',d:'Back against wall, heels 6 inches out. Lift balls of feet high, 1 sec hold, lower slowly. Identical to gym version.',sets:'3 × 15–20',f:'fy',fr:'Last set fail',rest:45,next:'Next set'}
      ]
    },
    ua: {
      day:'UPPER A', sub:'Tuesday · Push and pull · Home version',
      kit:'Pull-up bar · 2×35lb DBs · 20lb DB · Resistance band',
      ex:[
        {n:'Feet-Elevated Push-Up',eq:'Floor + Chair',d:'Feet on sofa or chair, hands close. Elevating feet shifts load to upper chest and shoulders — closest bodyweight substitute for bench press. Slow 3 sec eccentric. Add band across back for resistance.',sets:'4 × 8–15',f:'fn',fr:'Never fail',rest:120,next:'Pull-Up'},
        {n:'Pull-Up — bodyweight',eq:'Pull-up bar',d:'Full range — dead hang at bottom, chin over bar at top. No kipping. Same pattern as weighted gym pull-up. Max clean reps each set.',sets:'4 × max reps',f:'fn',fr:'Never fail',rest:120,next:'DB Overhead Press'},
        {n:'Standing DB Overhead Press',eq:'2×35lb DBs',d:'35lb in each hand. Press overhead from shoulder height. Standing version engages more core than seated. Same pattern as gym overhead press.',sets:'3 × 8–10',f:'fc',fr:'1–2 RIR',rest:90,next:'Single Arm DB Row'},
        {n:'Single Arm DB Row',eq:'35lb DB + Chair',d:'Brace on chair, 35lb in working hand. Full range — let arm hang at bottom, pull to hip. Replaces chest-supported row. Do both sides.',sets:'3 × 10–12 each',f:'fc',fr:'1–2 RIR',rest:90,next:'DB Floor Press'},
        {n:'DB Floor Press — neutral grip',eq:'2×35lb DBs',d:'Lie on floor, 35lb each hand, palms facing each other. Press up. Floor limits range but still hits chest and triceps effectively. Replaces incline dumbbell press.',sets:'3 × 10–12',f:'fy',fr:'Last set fail',rest:60,next:'Band Pull-Apart'},
        {n:'Band Pull-Apart',eq:'Resistance band',d:'Hold band at shoulder width, pull apart to chest. Slow controlled. Replaces face pull — same rear delt and rotator cuff stimulus.',sets:'3 × 20–25',f:'fy',fr:'Last set fail',rest:45,next:'Next set'}
      ]
    },
    lb: {
      day:'LOWER B', sub:'Thursday · Hinge dominant · Home version',
      kit:'2×35lb DBs · 20lb DB · Resistance band · Sofa',
      ex:[
        {n:'DB Romanian Deadlift — slow',eq:'2×35lb DBs',d:'Both 35s, 4 sec eccentric every rep. Replaces conventional deadlift as primary hinge. The slow eccentric makes 70lbs genuinely demanding. Back flat, hinge not round.',sets:'4 × 8–10',f:'fn',fr:'Never fail',rest:120,next:'Goblet Squat'},
        {n:'Goblet Squat — deep pause',eq:'20lb DB',d:'20lb at chest. Go as deep as possible, 3 sec pause at bottom. Replaces front squat — upright torso, quad dominant. Pause and depth compensate for lighter weight.',sets:'3 × 10–12',f:'fc',fr:'1–2 RIR',rest:90,next:'Banded Hip Thrust'},
        {n:'Banded Hip Thrust',eq:'Band + Sofa',d:'Upper back on sofa, band across hips anchored under feet. Drive hips to ceiling, 1 sec squeeze at top. Band adds peak contraction resistance dumbbells cannot replicate in this position.',sets:'4 × 15–20',f:'fc',fr:'1–2 RIR',rest:60,next:'Single Leg RDL'},
        {n:'Single Leg Romanian Deadlift',eq:'35lb DB',d:'35lb in opposite hand to working leg. Hinge forward, non-working leg extends back. Replaces single leg press — hits hamstring, glute, and balance simultaneously.',sets:'3 × 8–10 each',f:'fy',fr:'Last set fail',rest:60,next:'Single Leg Calf Raise'},
        {n:'Single Leg Calf Raise',eq:'Bodyweight + Step',d:'One foot on a step or kerb. Lower heel below step level, raise up on ball of foot. Full stretch each rep. Replaces standing calf raise.',sets:'3 × 15–20 each',f:'fy',fr:'Last set fail',rest:45,next:'Next set'}
      ]
    },
    ub: {
      day:'UPPER B', sub:'Friday · Vertical push and pull · Home version',
      kit:'Pull-up bar · 2×35lb DBs · 20lb DB · Resistance band',
      ex:[
        {n:'Pull-Up — max reps',eq:'Pull-up bar',d:'Max clean reps each set. Replaces barbell row as primary pull. If you hit 10+ clean reps consistently, add resistance by looping band with weight hanging from it.',sets:'4 × max reps',f:'fn',fr:'Never fail',rest:120,next:'DB Arnold Press'},
        {n:'DB Arnold Press',eq:'2×35lb DBs',d:'Start with palms facing you, rotate to palms forward as you press up. Hits all three delt heads. More range of motion than standard shoulder press.',sets:'4 × 8–10',f:'fc',fr:'1–2 RIR',rest:90,next:'Tricep Dip'},
        {n:'Tricep Dip — feet elevated',eq:'2 chairs or sofa',d:'Hands on chair behind you, feet elevated on another surface. Lower until upper arms parallel to floor, press back up. Add weight on lap for more resistance.',sets:'3 × 10–15',f:'fc',fr:'1–2 RIR',rest:90,next:'Band Lat Pulldown'},
        {n:'Band Lat Pulldown',eq:'Band + Door anchor',d:'Anchor band at top of doorframe. Kneel below, pull band to upper chest. Full stretch at top, squeeze lats at bottom. Replaces lat pulldown — same movement pattern.',sets:'3 × 15–20',f:'fc',fr:'1–2 RIR',rest:60,next:'Lateral Raise'},
        {n:'DB Lateral Raise',eq:'20lb DB',d:'20lb is the right weight for laterals — isolation not strength. Slow controlled reps, slight bend in elbow, raise to shoulder height only.',sets:'3 × 15–20',f:'fy',fr:'Last set fail',rest:45,next:'Hammer Curl'},
        {n:'Hammer Curl',eq:'2×35lb DBs',d:'Identical to gym version. 35lb each hand, neutral grip, controlled. No swinging.',sets:'3 × 10–12',f:'fy',fr:'Last set fail',rest:45,next:'Next set'}
      ]
    }
  }
};

function render(m, s) {
  var main = document.getElementById('main');
  if(s === 'info') { main.innerHTML = renderInfo(); return; }
  var data = DATA[m][s];
  if(!data) return;
  var key = m[0] + s;
  var total = data.ex.length;
  var doneCnt = 0;
  for(var i=1;i<=total;i++) if(done[key+i]) doneCnt++;
  var pct = Math.round(doneCnt/total*100);

  var html = '<div class="sess-header">';
  html += '<div class="sess-day">' + data.day + '</div>';
  html += '<div class="sess-sub">' + data.sub + '</div>';
  if(data.kit) html += '<div class="home-badge">🏠 ' + data.kit + '</div>';
  html += '<div class="prog-wrap"><div class="prog-label"><span>Progress</span><span>' + doneCnt + ' / ' + total + '</span></div>';
  html += '<div class="prog-bar"><div class="prog-fill" id="pfill" style="width:' + pct + '%"></div></div></div>';
  html += '</div>';

  if(m === 'home' && data.kit) {
    html += '<div class="kit-note">📦 Equipment: ' + data.kit + '</div>';
  }

  data.ex.forEach(function(ex, idx) {
    var num = idx + 1;
    var k = key + num;
    var isDone = done[k] ? ' done' : '';
    html += '<div id="ec' + k + '" class="ex-card' + isDone + '">';
    html += '<div class="ex-main">';
    html += '<div class="ex-num">' + num + '</div>';
    html += '<div>';
    if(ex.eq) html += '<span class="equip">' + ex.eq + '</span>';
    html += '<div class="ex-name">' + ex.n + '</div>';
    html += '<div class="ex-note">' + ex.d + '</div>';
    html += '</div>';
    html += '<div class="ex-right"><div class="ex-sets">' + ex.sets + '</div>';
    html += '<span class="fb ' + ex.f + '">' + ex.fr + '</span></div>';
    html += '</div>';
    html += '<div class="ex-actions">';
    html += '<button class="ex-btn" onclick="startT(' + ex.rest + ',\'' + ex.next + '\')">Rest ' + fmtR(ex.rest) + '</button>';
    html += '<button class="ex-btn done-btn" onclick="markEx(\'' + key + '\',' + num + ',' + total + ')">✓ Done</button>';
    html += '</div></div>';
  });

  main.innerHTML = html;
}

function fmtR(s) {
  if(s >= 60 && s % 60 === 0) return (s/60) + ' min';
  if(s >= 60) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return s + 's';
}

    '<div class="sec-lbl">Weekly Schedule</div>' +

function setMode(m) {
  mode = m;
  document.getElementById('btn-gym').classList.toggle('active', m==='gym');
  document.getElementById('btn-home').classList.toggle('active', m==='home');
  render(mode, cur);
}

function go(s) {
  cur = s;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('nav-'+s).classList.add('active');
  render(mode, s);
  document.getElementById('main').scrollTop = 0;
}

function markEx(key, num, total) {
  var k = key + num;
  done[k] = true;
  var card = document.getElementById('ec' + k);
  if(card) card.classList.add('done');
  var fill = document.getElementById('pfill');
  var doneCnt = 0;
  for(var i=1;i<=total;i++) if(done[key+i]) doneCnt++;
  var pct = Math.round(doneCnt/total*100);
  if(fill) fill.style.width = pct + '%';
  var lbl = fill ? fill.parentElement.previousElementSibling.querySelector('span:last-child') : null;
  if(lbl) lbl.textContent = doneCnt + ' / ' + total;
  showN('Exercise ' + num + ' complete ✓');
  if(doneCnt === total) setTimeout(function(){showN('🔥 Session complete! Great work.');}, 800);
}

function startT(secs, next) {
  tTotal = secs; tSecs = secs;
  document.getElementById('tdis').textContent = secs;
  document.getElementById('tnxt').textContent = 'Next: ' + next;
  document.getElementById('tcirc').style.strokeDashoffset = '0';
  document.getElementById('tov').classList.add('show');
  clearInterval(tInt);
  tInt = setInterval(function(){
    tSecs--;
    document.getElementById('tdis').textContent = tSecs;
    document.getElementById('tcirc').style.strokeDashoffset = C*(1-tSecs/tTotal);
    if(tSecs <= 0){stopT();showN('Rest complete — go!');}
  }, 1000);
}

function stopT(){
  clearInterval(tInt);
  document.getElementById('tov').classList.remove('show');
}

function showN(msg){
  var n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(function(){n.classList.remove('show');}, 2500);
}

render('gym','la');
</script>
</body>
</html>
