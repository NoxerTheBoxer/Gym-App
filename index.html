<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymPro">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="./manifest.json">
<title>GymPro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#0a0a0a;--s1:#141414;--s2:#1e1e1e;--bd:#2a2a2a;--tx:#f0f0f0;--mt:#888;--ac:#e8ff00;--red:#ff453a;--org:#ff9f0a;--grn:#32d74b;--blu:#0a84ff;--pur:#bf5af2;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,sans-serif;font-size:15px;display:flex;flex-direction:column}
.topbar{background:var(--s1);border-bottom:1px solid var(--bd);padding:14px 16px 10px;padding-top:calc(14px + env(safe-area-inset-top,0px));flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;color:var(--ac);line-height:1}
.week-badge{font-size:11px;font-weight:600;background:rgba(232,255,0,.1);color:var(--ac);padding:4px 10px;border-radius:20px;border:1px solid rgba(232,255,0,.2)}
.nav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0}
.nav-btn{padding:10px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mt);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.nav-btn.active{color:var(--ac)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--ac);border-radius:2px}
.nav-icon{font-size:18px}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe))}
.panel{display:none;padding:12px 14px}
.panel.active{display:block}
.sess-header{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px}
.sess-day{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--ac);letter-spacing:1px;line-height:1}
.sess-sub{font-size:12px;color:var(--mt);margin-top:2px}
.prog-wrap{margin-top:10px}
.prog-label{font-size:11px;color:var(--mt);margin-bottom:4px;display:flex;justify-content:space-between}
.prog-bar{background:var(--bd);height:4px;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s;width:0%}
.section-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--mt);margin:14px 0 8px;padding:0 2px;display:flex;align-items:center;gap:8px}
.section-header::after{content:'';flex:1;height:1px;background:var(--bd)}
.ex-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ex-card.done{border-color:var(--grn);opacity:.65}
.ex-card.warmup{border-color:rgba(10,132,255,.2);background:rgba(10,132,255,.04)}
.ex-card.primer{border-color:rgba(191,90,242,.2);background:rgba(191,90,242,.04)}
.ex-card.superset{border-left:3px solid var(--org)}
.ex-main{display:grid;grid-template-columns:36px 1fr auto;gap:8px;align-items:start;padding:12px}
.ex-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--bd);line-height:1}
.ex-card.done .ex-num{color:var(--grn)}
.ex-card.warmup .ex-num{color:rgba(10,132,255,.3);font-size:18px}
.ex-card.primer .ex-num{color:rgba(191,90,242,.4);font-size:18px}
.ex-name{font-weight:600;font-size:14px;margin-bottom:3px}
.ex-note{font-size:12px;color:var(--mt);line-height:1.4}
.tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-bottom:4px;margin-right:3px}
.tag-wu{background:rgba(10,132,255,.1);color:#4da3ff;border:1px solid rgba(10,132,255,.2)}
.tag-pr{background:rgba(191,90,242,.1);color:#d084f7;border:1px solid rgba(191,90,242,.2)}
.tag-ss{background:rgba(255,159,10,.1);color:var(--org);border:1px solid rgba(255,159,10,.2)}
.tag-sk{background:rgba(50,215,75,.1);color:var(--grn);border:1px solid rgba(50,215,75,.2)}
.ex-right{text-align:right;flex-shrink:0}
.ex-sets{font-size:12px;color:var(--mt);margin-bottom:5px;white-space:nowrap}
.fb{display:inline-block;font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
.fn{background:rgba(255,69,58,.15);color:var(--red)}
.fc{background:rgba(255,159,10,.15);color:var(--org)}
.fy{background:rgba(50,215,75,.15);color:var(--grn)}
.fp{background:rgba(191,90,242,.15);color:var(--pur)}
.ex-actions{display:flex;gap:6px;padding:0 12px 12px}
.ex-btn{flex:1;padding:8px;font-size:12px;font-weight:600;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);cursor:pointer}
.ex-btn:active{transform:scale(.97)}
.done-btn{background:rgba(50,215,75,.1);color:var(--grn);border-color:rgba(50,215,75,.3)}
.timer-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.timer-ov.show{display:flex}
.t-label{font-size:13px;font-weight:600;color:var(--mt);text-transform:uppercase;letter-spacing:.1em}
.t-circle{width:200px;height:200px;position:relative}
.t-circle svg{width:200px;height:200px;transform:rotate(-90deg)}
.t-track{fill:none;stroke:var(--s2);stroke-width:8}
.t-prog{fill:none;stroke:var(--ac);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.t-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.t-secs{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--ac);line-height:1}
.t-next{font-size:11px;color:var(--mt);margin-top:4px}
.t-btns{display:flex;gap:12px}
.t-btn{padding:14px 28px;font-size:14px;font-weight:700;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);cursor:pointer;text-transform:uppercase}
.t-btn.skip{background:var(--ac);color:#000;border-color:var(--ac)}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mt);margin:16px 0 8px}
.r-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:8px}
.r-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.r-body{font-size:13px;color:var(--mt);line-height:1.6}
.p-table{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:12px}
.p-head{padding:12px 14px;font-weight:600;font-size:14px;border-bottom:1px solid var(--bd)}
.p-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);font-size:13px;gap:12px}
.p-row:last-child{border-bottom:none}
.p-val{color:var(--mt);font-size:12px;text-align:right;flex-shrink:0}
.wk-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.wk-day{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:8px 3px;text-align:center}
.wk-dn{font-size:10px;font-weight:600;color:var(--mt);margin-bottom:4px;text-transform:uppercase}
.wk-tag{font-size:8px;font-weight:700;padding:2px 3px;border-radius:3px;display:block;margin:1px auto;text-transform:uppercase}
.wl{background:rgba(255,69,58,.2);color:#ff6b60}
.wu{background:rgba(10,132,255,.2);color:#0a84ff}
.wf{background:rgba(232,255,0,.2);color:var(--ac)}
.wr{background:rgba(255,255,255,.05);color:var(--mt)}
.notif{position:fixed;bottom:calc(20px + var(--safe));left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:200;transition:transform .3s;white-space:nowrap}
.notif.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-row">
    <div class="app-title">GymPro</div>
    <span class="week-badge">BJJ Athlete Programme</span>
  </div>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="go('tue')" id="nav-tue"><span class="nav-icon">🦵</span>Tue · Lower</button>
  <button class="nav-btn" onclick="go('wed')" id="nav-wed"><span class="nav-icon">💪</span>Wed · Upper</button>
  <button class="nav-btn" onclick="go('fri')" id="nav-fri"><span class="nav-icon">⚡</span>Fri · Full</button>
  <button class="nav-btn" onclick="go('info')" id="nav-info"><span class="nav-icon">📋</span>Info</button>
</div>
<div class="main" id="main"></div>
<div class="timer-ov" id="tov">
  <div class="t-label">REST TIMER</div>
  <div class="t-circle"><svg viewBox="0 0 200 200"><circle class="t-track" cx="100" cy="100" r="88"/><circle class="t-prog" id="tcirc" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"/></svg><div class="t-num"><div class="t-secs" id="tdis">120</div><div class="t-next" id="tnxt">Next: —</div></div></div>
  <div class="t-btns"><button class="t-btn" onclick="stopT()">Cancel</button><button class="t-btn skip" onclick="stopT()">Skip ›</button></div>
</div>
<div class="notif" id="notif"></div>
<script>
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

var cur='tue', done={}, tInt=null, tSecs=0, tTotal=0;
var C=553;

// type: 'warmup' | 'primer' | 'main' | 'superset' | 'skill' | 'finisher'
var DATA = {
  tue: {
    day:'LOWER BODY', sub:'Tuesday · 3:00–4:15PM · Squat + hinge + core + neck',
    sections:[
      {
        label:'Warm Up',
        items:[
          {n:'90/90 Hip Stretch',type:'warmup',d:'2 minutes each side. Most important BJJ mobility exercise. Sit with both legs at 90° — front leg internally rotated, back leg externally. Breathe deep and sink.',sets:'2 min each side',f:'fp',fr:'Feel it',rest:0,next:'Hip Circles'},
          {n:'Hip Circles',type:'warmup',d:'Standing on one leg, trace large circles with the raised knee. Opens the hip joint before loading it.',sets:'10 each direction each leg',f:'fp',fr:'Control',rest:0,next:'Leg Swings'},
          {n:'Leg Swings',type:'warmup',d:'Hold wall, swing leg forward and back through full range. Hamstring and hip flexor activation.',sets:'15 each leg',f:'fp',fr:'Full range',rest:0,next:'Deep Squat Hold'},
          {n:'Deep Squat Hold',type:'warmup',d:'Full depth squat, heels flat, elbows pushing knees out. Hold at bottom. Develops ankle dorsiflexion for front squat depth.',sets:'60 seconds',f:'fp',fr:'Heels flat',rest:0,next:'Ankle Circles'},
          {n:'Ankle Circles',type:'warmup',d:'Seated or standing, rotate each ankle through full range. Prepares joints for front squat loading.',sets:'10 each direction',f:'fp',fr:'Full range',rest:0,next:'Goblet Squat Primer'}
        ]
      },
      {
        label:'Primer',
        items:[
          {n:'Goblet Squat with Pause',type:'primer',d:'Light weight at chest. Pause 3 seconds at bottom every rep. Grooves the front squat pattern before loading the barbell. Elbows up, chest tall.',sets:'2 × 5 light',f:'fp',fr:'Perfect form',rest:60,next:'Barbell Front Squat'}
        ]
      },
      {
        label:'Main Work',
        items:[
          {n:'Barbell Front Squat',type:'main',d:'Primary strength movement. More upright torso than back squat — develops thoracic mobility and anterior core strength that directly transfers to BJJ guard work. Elbows high throughout. Never sacrifice depth for weight.',sets:'4 × 5–6',f:'fn',fr:'Never fail',rest:180,next:'Romanian Deadlift'},
          {n:'Romanian Deadlift',type:'main',d:'3 second eccentric every rep without exception. Feel the hamstring stretch at the bottom. Back flat, hinge not round. Posterior chain strength for takedown completion and guard recovery.',sets:'3 × 6–8',f:'fc',fr:'1–2 RIR',rest:120,next:'Nordic Hamstring Curl'},
          {n:'Nordic Hamstring Curl',type:'main',d:'5–8 seconds down on every negative. As slow as physically possible. Catch yourself with your hands at the bottom. This will humble you immediately. Best hamstring injury prevention exercise in existence.',sets:'3 × 5 negatives',f:'fc',fr:'Slow as possible',rest:120,next:'Bulgarian Split Squat'},
          {n:'Bulgarian Split Squat',type:'main',d:'Rear foot elevated on bench. Front foot far enough forward that shin stays vertical at the bottom. Hip flexor length and single leg stability — both critical for wrestling stance and takedown defence.',sets:'3 × 8–10 each leg',f:'fc',fr:'1–2 RIR',rest:90,next:'Tibialis Raise'}
        ]
      },
      {
        label:'Superset — Lower Leg',
        items:[
          {n:'Tibialis Raise',type:'superset',d:'Back against wall, heels 6 inches out. Lift balls of feet as high as possible, 1 second hold, lower slowly. Fixes BJJ foot cramping. Superset immediately with calf raises.',sets:'3 × 15',f:'fy',fr:'Last set fail',rest:0,next:'Standing Calf Raise'},
          {n:'Standing Calf Raise',type:'superset',d:'Full range of motion. Slow tempo. Superset with tibialis raises — no rest between the two. Complete lower leg development in one pairing.',sets:'3 × 15',f:'fy',fr:'Last set fail',rest:60,next:'Dragon Flag'}
        ]
      },
      {
        label:'Core and Skill',
        items:[
          {n:'Dragon Flag Progressions',type:'skill',d:'Start with tuck dragon flag if full version is not yet achievable. Lower yourself with complete body tension — straight line from shoulders to feet. Bruce Lee\'s core exercise. Builds the anti-extension strength that makes your guard recovery explosive.',sets:'3 sets to failure',f:'fy',fr:'Failure',rest:90,next:'Cable Woodchoppers'},
          {n:'Cable Woodchoppers or Heavy Russian Twists',type:'main',d:'Rotational core strength for guard sweeps, kimura attacks, and defensive bridging. Hip-shoulder separation that generates throw and sweep power. Full rotation, controlled speed.',sets:'3 × 10 each side',f:'fy',fr:'Controlled',rest:60,next:'Four-Way Neck Work'}
        ]
      },
      {
        label:'Neck — Non-Negotiable',
        items:[
          {n:'Four-Way Neck Work',type:'main',d:'Forward flexion, extension, left lateral, right lateral. Use manual resistance from your own hand — place hand on forehead and resist as you push forward. BJJ loads your neck constantly. Twice weekly direct neck training prevents the chronic stiffness that develops in every grappler who neglects it.',sets:'3 × 15 each direction',f:'fy',fr:'Controlled',rest:60,next:'Done'}
        ]
      }
    ]
  },

  wed: {
    day:'UPPER BODY', sub:'Wednesday · 7:00–8:15AM · Pull dominant + calisthenics skills',
    sections:[
      {
        label:'Warm Up',
        items:[
          {n:'Arm Circles',type:'warmup',d:'10 forward and backward each arm. Progressively larger circles. Shoulder joint lubrication before loading.',sets:'10 each direction',f:'fp',fr:'Full range',rest:0,next:'Band Pull-Aparts'},
          {n:'Band Pull-Aparts',type:'warmup',d:'Hold band at shoulder width, pull apart to chest. Activates rear delts and external rotators before any pressing.',sets:'20 reps',f:'fp',fr:'Full stretch',rest:0,next:'Shoulder Dislocations'},
          {n:'Shoulder Dislocations',type:'warmup',d:'Wide grip on band or broomstick. Rotate overhead and behind in one slow arc. Develops the shoulder mobility your handstand work requires.',sets:'10 reps',f:'fp',fr:'Wide grip',rest:0,next:'Wrist Circles'},
          {n:'Wrist Circles',type:'warmup',d:'10 each direction. BJJ and pressing both load the wrists significantly. Never skip this.',sets:'10 each direction',f:'fp',fr:'Full range',rest:0,next:'Dead Hang'},
          {n:'Dead Hang',type:'warmup',d:'Hang from pull-up bar with full bodyweight. Decompress spine, activate grip, and stretch lats before pulling work.',sets:'30 seconds',f:'fp',fr:'Relax shoulders',rest:0,next:'Handstand Wall Hold'}
        ]
      },
      {
        label:'Primer',
        items:[
          {n:'Handstand Wall Hold',type:'primer',d:'Face wall, walk feet up until body is vertical. Ears between arms, core tight, legs together. Activates shoulder stabilisers and builds body tension that improves every subsequent exercise.',sets:'3 × 30 seconds',f:'fp',fr:'Body tight',rest:30,next:'Explosive High Pull-Ups'},
          {n:'Explosive High Pull-Ups',type:'primer',d:'Maximum intent on every rep. Pull as fast as possible — chin well above bar. Neurologically potentiates the pulling muscles before heavier work. Not conditioning — pure speed.',sets:'2 × 3–5',f:'fp',fr:'Max speed',rest:60,next:'Towel Weighted Pull-Ups'}
        ]
      },
      {
        label:'Main Pulling Work',
        items:[
          {n:'Towel Weighted Pull-Ups',type:'main',d:'Wrap a towel around the bar and grip the ends — this is the exact grip demand of lapel and sleeve grips in BJJ. Add weight via belt once bodyweight reps exceed 8. Your most important BJJ exercise in this entire programme.',sets:'4 × 5–8',f:'fn',fr:'Never fail',rest:150,next:'Incline DB Press'}
        ]
      },
      {
        label:'Superset — Push + Shoulder Health',
        items:[
          {n:'Incline Dumbbell Bench Press',type:'superset',d:'Upper chest and anterior shoulder. Dumbbells allow more natural shoulder rotation than barbell — less impingement risk. Superset immediately with pull-aparts.',sets:'3 × 6–8',f:'fc',fr:'1–2 RIR',rest:0,next:'Band Pull-Aparts (superset)'},
          {n:'Band Pull-Aparts',type:'superset',d:'Immediately after pressing — zero rest. Counteracts the internal rotation that pressing creates. Rear delt activation between sets costs nothing and protects your shoulders across years of training.',sets:'3 × 20',f:'fy',fr:'Full stretch',rest:90,next:'Barbell Rows'}
        ]
      },
      {
        label:'Superset — Row + Face Pull',
        items:[
          {n:'Barbell Rows',type:'superset',d:'Upper back thickness. Control the eccentric — do not let the bar drop. Superset immediately with face pulls.',sets:'4 × 8–10',f:'fc',fr:'1–2 RIR',rest:0,next:'Face Pulls (superset)'},
          {n:'Face Pulls',type:'superset',d:'Immediately after rows. Rear delt and external rotator health. High rep range is correct here — rear delts respond to volume not low rep heavy work. Non-negotiable for long term shoulder health.',sets:'3 × 15',f:'fy',fr:'Last set fail',rest:90,next:'Weighted Dips'}
        ]
      },
      {
        label:'Direct Push',
        items:[
          {n:'Weighted Dips',type:'main',d:'Slight forward lean to emphasise chest. Tricep and anterior shoulder strength for pushing frames and creating space in BJJ bottom positions.',sets:'3 × 8–10',f:'fc',fr:'1–2 RIR',rest:90,next:'Incline DB Curl'}
        ]
      },
      {
        label:'Superset — Direct Arm Work',
        items:[
          {n:'Incline Dumbbell Curl',type:'superset',d:'Lying on incline bench, arms hanging. Full stretch at bottom — develops long head of bicep specifically. Superset with hammer curls.',sets:'2 × 12',f:'fy',fr:'Last set fail',rest:0,next:'Hammer Curl (superset)'},
          {n:'Hammer Curl',type:'superset',d:'Neutral grip. Develops brachialis and forearm thickness that improves gi grip pulling strength. The direct arm work gap that was missing from your previous programme.',sets:'2 × 12',f:'fy',fr:'Last set fail',rest:60,next:'Tuck Front Lever Hold'}
        ]
      },
      {
        label:'Calisthenics Skill + Grip',
        items:[
          {n:'Tuck Front Lever Hold',type:'skill',d:'From pull-up bar, bring knees to chest and hold horizontal position. Accumulate 8 seconds per set. Progress: tuck → advanced tuck → one leg extended → full front lever over months. Direct carry-over to pulling strength and body tension.',sets:'3 × 8 seconds',f:'fp',fr:'Accumulate hold',rest:60,next:'Wrist Conditioning'},
          {n:'Wrist Conditioning',type:'skill',d:'Rice bucket protocol — plunge hand in and open/close fist for 3 minutes. Or plate pinches — hold 10lb plate smooth side at your side for 30 seconds each hand. Gi grip endurance is a competitive differentiator. Build it directly.',sets:'3 minutes',f:'fy',fr:'Burn',rest:0,next:'Done'}
        ]
      }
    ]
  },

  fri: {
    day:'FULL BODY', sub:'Saturday · 8:00–9:30AM · Power + strength + calisthenics + cardio',
    sections:[
      {
        label:'Warm Up',
        items:[
          {n:"World's Greatest Stretch",type:'warmup',d:'From lunge: same-side hand inside front foot, rotate opposite arm to ceiling, drop elbow to floor, then straighten front leg. Develops hip flexor length, thoracic rotation, and hamstring flexibility in one movement.',sets:'5 each side',f:'fp',fr:'Slow and deliberate',rest:0,next:'Hip Flexor Lunge'},
          {n:'Hip Flexor Lunge',type:'warmup',d:'Kneeling lunge position. Drive hips forward, hold stretch. Essential before Turkish get-ups and power cleans.',sets:'60 seconds each side',f:'fp',fr:'Feel the stretch',rest:0,next:'Thoracic Rotation'},
          {n:'Thoracic Rotation',type:'warmup',d:'Seated on heels or quadruped. Rotate thoracic spine as far as possible each direction. Opens up for push press and Turkish get-up overhead positions.',sets:'10 each side',f:'fp',fr:'Full rotation',rest:0,next:'Band Pull-Aparts'},
          {n:'Band Pull-Aparts',type:'warmup',d:'20 reps. Shoulder prep before overhead work. Quick and effective.',sets:'20 reps',f:'fp',fr:'Full stretch',rest:0,next:'Light KB Swings'},
          {n:'Light Kettlebell Swings',type:'warmup',d:'Hip hinge activation and posterior chain prep. Drive hips not arms. Prepares the exact movement pattern used in hang power cleans.',sets:'15 reps',f:'fp',fr:'Hip drive',rest:0,next:'Turkish Get-Up'}
        ]
      },
      {
        label:'Primer',
        items:[
          {n:'Turkish Get-Up',type:'primer',d:'Use light weight until the pattern is completely clean. Shoulder stability, hip mobility, core tension, and coordination all trained simultaneously in one movement. Never rush a TGU — each phase is deliberate.',sets:'2 × 3 each side',f:'fp',fr:'Perfect form only',rest:60,next:'Hang Power Clean'}
        ]
      },
      {
        label:'Power — Maximum Intent',
        items:[
          {n:'Hang Power Clean',type:'main',d:'Most technically demanding exercise in this programme. Full recovery between sets — 3 minutes minimum. Every rep at maximum intent. If technique is not solid yet, substitute Hang High Pulls until you get coaching. Develops explosive hip extension for faster takedowns and more powerful scrambles.',sets:'4 × 3–5',f:'fn',fr:'Never fail',rest:180,next:'Push Press'},
          {n:'Push Press',type:'main',d:'Use leg drive to initiate every rep. The lower-to-upper body power transfer is the training stimulus — not a strict press. Develops the explosive power that finishes double leg takedowns and drives explosive uppercuts.',sets:'3 × 6',f:'fc',fr:'1–2 RIR',rest:150,next:'Trap Bar Deadlift'}
        ]
      },
      {
        label:'Strength',
        items:[
          {n:'Trap Bar Deadlift',type:'main',d:'Heaviest pull of the week. More upright torso than conventional deadlift — reduces lower back stress when erectors are already loaded from earlier in the week. Three full minutes between sets. This is a maximum effort movement.',sets:'3 × 5',f:'fn',fr:'Never fail',rest:180,next:"Farmer's Walks"},
          {n:"Farmer's Walks",type:'main',d:'As heavy as possible while maintaining upright posture. 40–50 metres per walk. Grip endurance, trap strength, core bracing, and cardiovascular fitness all simultaneously. The most underrated exercise in any programme. Your last set should be genuinely hard to complete.',sets:"4 × 40–50m",f:'fc',fr:'Heavy and upright',rest:90,next:'Tuck Front Lever Hold'}
        ]
      },
      {
        label:'Superset — Calisthenics Skills',
        items:[
          {n:'Tuck Front Lever Hold',type:'skill',d:'Accumulate 8 seconds per set. This is your second front lever session of the week — twice weekly practice produces consistent progression. Progress toward advanced tuck and single leg extended.',sets:'3 × 8 seconds',f:'fp',fr:'Accumulate hold',rest:0,next:'Tuck Back Lever Hold'},
          {n:'Tuck Back Lever Hold',type:'skill',d:'Superset with front lever. From hang, pull body horizontal behind the bar in tuck position. Complements front lever development — front and back lever together build complete ring and bar strength. Progresses toward human flag.',sets:'3 × 8 seconds',f:'fp',fr:'Accumulate hold',rest:60,next:'Four-Way Neck Work'}
        ]
      },
      {
        label:'Neck — Non-Negotiable',
        items:[
          {n:'Four-Way Neck Work',type:'main',d:'Second neck session of the week. Same as Tuesday — forward flexion, extension, left lateral, right lateral using manual resistance. Twice weekly produces rapid strength and resilience gains.',sets:'3 × 15 each direction',f:'fy',fr:'Controlled',rest:60,next:'Zone 2 Finisher'}
        ]
      },
      {
        label:'Conditioning Finisher',
        items:[
          {n:'Zone 2 Finisher',type:'finisher',d:'10 minutes at fully conversational pace — if you cannot speak in complete sentences you are going too hard. Rowing machine, stationary bike, light jog, or fast walk. Develops the aerobic recovery base that improves your BJJ gas tank over months. Heart rate 65–70% of maximum.',sets:'10 minutes',f:'fy',fr:'Conversational pace',rest:0,next:'Done'}
        ]
      }
    ]
  }
};

function countMainEx(sess) {
  var total = 0;
  DATA[sess].sections.forEach(function(sec) {
    sec.items.forEach(function(item) {
      if(item.type !== 'warmup') total++;
    });
  });
  return total;
}

function countDone(sess) {
  var cnt = 0;
  DATA[sess].sections.forEach(function(sec, si) {
    sec.items.forEach(function(item, ii) {
      if(item.type !== 'warmup' && done[sess+'-'+si+'-'+ii]) cnt++;
    });
  });
  return cnt;
}

function render(s) {
  var main = document.getElementById('main');
  if(s === 'info') { main.innerHTML = renderInfo(); return; }
  var data = DATA[s];
  if(!data) return;

  var total = countMainEx(s);
  var doneCnt = countDone(s);
  var pct = Math.round(doneCnt/total*100);

  var html = '<div style="padding:12px 14px">';
  html += '<div class="sess-header">';
  html += '<div class="sess-day">' + data.day + '</div>';
  html += '<div class="sess-sub">' + data.sub + '</div>';
  html += '<div class="prog-wrap"><div class="prog-label"><span>Progress</span><span>' + doneCnt + ' / ' + total + '</span></div>';
  html += '<div class="prog-bar"><div class="prog-fill" id="pfill" style="width:' + pct + '%"></div></div></div>';
  html += '</div>';

  data.sections.forEach(function(sec, si) {
    html += '<div class="section-header">' + sec.label + '</div>';
    sec.items.forEach(function(item, ii) {
      var key = s + '-' + si + '-' + ii;
      var isMain = item.type !== 'warmup';
      var isDone = done[key] ? ' done' : '';
      var cardClass = 'ex-card';
      if(item.type === 'warmup') cardClass += ' warmup';
      else if(item.type === 'primer') cardClass += ' primer';
      else if(item.type === 'superset') cardClass += ' superset';

      html += '<div id="ec' + key + '" class="' + cardClass + isDone + '">';
      html += '<div class="ex-main">';

      // Number / icon
      var numDisplay = '';
      if(item.type === 'warmup') numDisplay = '○';
      else if(item.type === 'primer') numDisplay = '◈';
      else if(item.type === 'skill') numDisplay = '★';
      else if(item.type === 'finisher') numDisplay = '⟳';
      else numDisplay = (ii + 1);
      html += '<div class="ex-num">' + numDisplay + '</div>';

      html += '<div>';
      // Tag
      if(item.type === 'warmup') html += '<span class="tag tag-wu">Warm Up</span>';
      else if(item.type === 'primer') html += '<span class="tag tag-pr">Primer</span>';
      else if(item.type === 'superset') html += '<span class="tag tag-ss">Superset</span>';
      else if(item.type === 'skill') html += '<span class="tag tag-sk">Skill</span>';
      html += '<div class="ex-name">' + item.n + '</div>';
      html += '<div class="ex-note">' + item.d + '</div>';
      html += '</div>';

      html += '<div class="ex-right"><div class="ex-sets">' + item.sets + '</div>';
      html += '<span class="fb ' + item.f + '">' + item.fr + '</span></div>';
      html += '</div>';

      html += '<div class="ex-actions">';
      if(item.rest > 0) {
        html += '<button class="ex-btn" onclick="startT(' + item.rest + ',\'' + item.next.replace(/'/g,"\\'") + '\')">Rest ' + fmtR(item.rest) + '</button>';
      } else {
        html += '<button class="ex-btn" style="opacity:.4;cursor:default">No rest</button>';
      }
      html += '<button class="ex-btn done-btn" onclick="markEx(\'' + key + '\',\'' + s + '\')">✓ Done</button>';
      html += '</div></div>';
    });
  });

  html += '</div>';
  main.innerHTML = html;
}

function fmtR(s) {
  if(s >= 60 && s % 60 === 0) return (s/60) + ' min';
  if(s >= 60) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return s + 's';
}

    '<div class="p-row"><span>Weighted Pull-Up</span><span class="p-val">BW+45lbs → BW+65lbs</span></div>' +

}

function go(s) {
  cur = s;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('nav-'+s).classList.add('active');
  render(s);
  document.getElementById('main').scrollTop = 0;
}

function markEx(key, sess) {
  done[key] = true;
  var card = document.getElementById('ec' + key);
  if(card) card.classList.add('done');
  var total = countMainEx(sess);
  var doneCnt = countDone(sess);
  var pct = Math.round(doneCnt/total*100);
  var fill = document.getElementById('pfill');
  if(fill) {
    fill.style.width = pct + '%';
    var lbl = fill.parentElement.previousElementSibling.querySelector('span:last-child');
    if(lbl) lbl.textContent = doneCnt + ' / ' + total;
  }
  showN('Exercise complete ✓');
  if(doneCnt === total) setTimeout(function(){showN('🔥 Session complete! Great work.');}, 800);
}

function startT(secs, next) {
  tTotal = secs; tSecs = secs;
  document.getElementById('tdis').textContent = secs;
  document.getElementById('tnxt').textContent = 'Next: ' + next;
  document.getElementById('tcirc').style.strokeDashoffset = '0';
  document.getElementById('tov').classList.add('show');
  clearInterval(tInt);
  tInt = setInterval(function(){
    tSecs--;
    document.getElementById('tdis').textContent = tSecs;
    document.getElementById('tcirc').style.strokeDashoffset = C*(1-tSecs/tTotal);
    if(tSecs <= 0){stopT();showN('Rest complete — go!');}
  }, 1000);
}

function stopT(){
  clearInterval(tInt);
  document.getElementById('tov').classList.remove('show');
}

function showN(msg){
  var n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(function(){n.classList.remove('show');}, 2500);
}

render('tue');
</script>
